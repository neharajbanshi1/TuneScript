app = "tunescript"
primary_region = "iad"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[env]
  DJANGO_SETTINGS_MODULE = "config.settings"
  DJANGO_ALLOWED_HOSTS = "tunescript.fly.dev,localhost,127.0.0.1"
  CSRF_TRUSTED_ORIGINS = "https://tunescript.fly.dev"
  SECURE_SSL_REDIRECT = "True"

[[mounts]]
  source = "data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
