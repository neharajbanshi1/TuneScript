<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TuneScript{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .card {
            background: #141414;
            border: 1px solid #1f1f1f;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .card h2 {
            font-size: 1.2rem;
            color: #1db954;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; }
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #1f1f1f;
            margin-bottom: 32px;
        }
        .nav h1 { color: #1db954; font-size: 1.5rem; }
        .nav a { color: #b3b3b3; text-decoration: none; font-size: 0.9rem; }
        .nav a:hover { color: #fff; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: #1db954; color: #000; }
        .btn-primary:hover { background: #1ed760; transform: scale(1.02); }
        .btn-secondary { background: #282828; color: #fff; }
        .btn-secondary:hover { background: #333; }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            background: #1db95420;
            color: #1db954;
            margin: 2px;
        }
        .witty-tag {
            font-size: 0.85rem;
            color: #888;
            font-style: italic;
            margin-bottom: 16px;
        }
        .artist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 12px;
        }
        .artist-item { text-align: center; }
        .artist-item img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 6px;
        }
        .artist-item .name { font-size: 0.75rem; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .track-list { list-style: none; }
        .track-list li {
            padding: 8px 0;
            border-bottom: 1px solid #1f1f1f;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
        }
        .track-list li:last-child { border-bottom: none; }
        .track-list .rank { color: #666; width: 24px; text-align: right; font-size: 0.8rem; }
        .track-list .track-name { color: #fff; flex: 1; }
        .track-list .track-artist { color: #888; font-size: 0.8rem; }
        .stat-number { font-size: 2.5rem; font-weight: 700; color: #1db954; }
        .stat-label { font-size: 0.8rem; color: #888; }
        .time-toggle {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            background: #1a1a1a;
            border-radius: 8px;
            padding: 3px;
            width: fit-content;
        }
        .time-toggle button {
            padding: 6px 16px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: #888;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .time-toggle button.active {
            background: #1db954;
            color: #000;
            font-weight: 600;
        }
        .canvas-container { position: relative; height: 280px; width: 100%; }
        .flex-center { display: flex; align-items: center; justify-content: center; }
        .landing {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
        }
        .landing h1 { font-size: 3rem; color: #1db954; margin-bottom: 12px; }
        .landing p { color: #888; max-width: 420px; margin-bottom: 32px; line-height: 1.6; }
        .landing .subtitle { font-size: 1.1rem; color: #ccc; margin-bottom: 8px; }
        @media (max-width: 768px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .landing h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <h1>♫ TuneScript</h1>
            {% block nav_extra %}{% endblock %}
        </nav>
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
